<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>鳥類圖鑑</title>

<style>
body {
  font-family: "Segoe UI", sans-serif;
  margin: 0;
  padding: 20px;
  background: linear-gradient(135deg, #e0f7fa, #f5f7fa);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.input-box {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border: 1px solid #ddd;
  border-radius: 10px;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #4CAF50;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #43a047;
  transform: scale(1.02);
}

#list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

.card {
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  border-radius: 18px;
  padding: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.12);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

img {
  width: 100%;
  border-radius: 12px;
}

.tag {
  display: inline-block;
  background: linear-gradient(45deg, #4CAF50, #66bb6a);
  color: white;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  margin-top: 5px;
}

p {
  font-size: 13px;
  margin: 4px 0;
  color: #444;
}
</style>
</head>

<body>

<h1>🐦 鳥類圖鑑 Pro</h1>

<div class="input-box">
  <input id="name" placeholder="鳥名">

  <select id="category">
    <option>猛禽</option>
    <option>水鳥</option>
    <option>鳴禽</option>
    <option>其他</option>
  </select>

  <input type="file" id="imageFile">

  <button onclick="addBird()">＋ 新增紀錄</button>
</div>

<div id="list"></div>

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<script>
let birds = JSON.parse(localStorage.getItem("birds")) || [];

function addBird() {
  const file = document.getElementById("imageFile").files[0];

  if (!file) {
    alert("請選擇圖片");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    const img = new Image();
    img.src = e.target.result;

    img.onload = function() {

      // ⭐ EXIF 正確放在 callback 裡
      EXIF.getData(img, function() {
        let date = EXIF.getTag(this, "DateTimeOriginal") || "未知時間";

        const bird = {
          name: document.getElementById("name").value || "未命名",
          category: document.getElementById("category").value,
          image: e.target.result,
          date: date,
          fileName: file.name
        };

        birds.push(bird);
        localStorage.setItem("birds", JSON.stringify(bird));

        render();
      });

    };
  };

  reader.readAsDataURL(file);
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  birds.forEach(b => {
    list.innerHTML += `
      <div class="card">
        <img src="${b.image}">
        <h3>${b.name}</h3>
        <div class="tag">${b.category}</div>
        <p>📅 ${b.date}</p>
        <p>📁 ${b.fileName}</p>
      </div>
    `;
  });
}

render();
</script>

</body>
</html>
